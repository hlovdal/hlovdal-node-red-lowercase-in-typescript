name: test-esm
permissions:
  contents: read

on:
  push:
    branches: [ "wip/esm" ]

jobs:

  test-esm:

    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [24.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - name: Check out code
      uses: actions/checkout@v6
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - name: Run end to end test against installing_esm_nodes branch of node-red
      run: bash ./bin/run-e2e-test-against-node-red-esm.sh
